name: Feature Request
description: Suggest a practical improvement to CCL, docs, examples, or generated output.
title: "feature: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Feature requests work best when they describe the real project problem, not only the desired implementation.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem would this feature solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: What should CCL do?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI
        - Documentation
        - Examples
        - Attributes
        - Imports
        - Serialization
        - Go generator
        - GDScript generator
        - Python generator
        - TypeScript generator
        - JavaScript generator
        - C# generator
        - Rust generator
        - New target language
        - Other
    validations:
      required: true
  - type: textarea
    id: example
    attributes:
      label: Example
      description: Show the CCL input, generated output, or command shape you imagine.
      render: ccl
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: What workarounds or alternate designs have you considered?
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility Notes
      description: Would this change affect existing CCL files or generated output?
