name: Bug Report
description: Report a crash, wrong generated code, parser issue, or bad error message.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please include enough detail for maintainers to reproduce the issue.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Parser
        - Sanitizer
        - CLI
        - Go generator
        - GDScript generator
        - Python generator
        - TypeScript generator
        - JavaScript generator
        - C# generator
        - Rust generator
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: input
    attributes:
      label: CCL Input
      description: Paste the smallest CCL input that reproduces the problem.
      render: ccl
  - type: textarea
    id: command
    attributes:
      label: Command
      description: Paste the command you ran.
      render: bash
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What happened instead? Include error output if available.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: CCL Version
      description: Paste the release version, commit, or `ccl version` output.
  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: Windows, macOS, Linux, etc.
  - type: textarea
    id: extra
    attributes:
      label: Extra Context
      description: Add anything else that may help.
